<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tom's AI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<link rel="stylesheet" href="index.css">
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <span>🤖 Tom's AI</span>
    <div id="theme-controls">
      <select id="theme-select" onchange="applyTheme(this.value)"></select>
      <button id="mode-toggle" onclick="toggleMode()" title="Day / Night mode" aria-label="Toggle day/night mode">
        <span id="mode-icon-day">☀</span>
        <span id="mode-icon-night">☽</span>
      </button>
    </div>
  </div>
  <div id="sidebar-actions">
    <button id="new-btn" onclick="showNewConvPopup()">New Conversation</button>
    <button id="new-folder-btn" onclick="newFolder()">New Folder</button>
  </div>
  <div id="conv-list"></div>
</div>

<!-- Main -->
<div id="main">

  <!-- Top bar -->
  <div id="sp-bar">
    <div id="top-controls">
      <div id="sp-toggle" onclick="toggleSP()">
        <span>⚙️</span>
        <span>System Prompt</span>
        <span id="sp-arrow">▼</span>
      </div>
      <div class="top-group">
        <div id="model-picker">
          <label for="model-select">Model</label>
          <select id="model-select" onchange="onModelChange()">
            <option disabled selected>Loading models...</option>
          </select>
        </div>
        <div id="mode-picker">
          <select id="mode-select" onchange="onModeChange()">
            <option value="standard">Standard</option>
            <option value="pro">Pro</option>
          </select>
        </div>
      </div>
      <div class="top-group">
        <button id="export-btn" onclick="exportConv()" title="Export to Markdown">Export</button>
        <button id="audio-btn" onclick="exportAudio()" title="Export as Audio">Audio</button>
      </div>
    </div>
    <div id="sp-body">
      <div id="sp-template-row">
        <select id="sp-template-select" onchange="onSpTemplateChange()">
          <option value="">Custom (this conversation only)</option>
        </select>
        <button id="sp-template-edit-btn" onclick="openSpTemplateModal()" title="Manage templates">✎</button>
      </div>
      <textarea id="sp-input" placeholder="e.g. You are a concise assistant that always replies in bullet points."></textarea>
      <button id="sp-save" onclick="saveSP()">Apply</button>
    </div>
  </div>

  <!-- Token counter -->
  <div id="token-bar" style="display:none">
    <div id="token-bar-inner">
      <span id="token-memory"></span>
      <div id="token-meter"><div id="token-meter-fill"></div></div>
      <span id="token-cost"></span>
    </div>
  </div>

  <!-- Messages -->
  <div id="chat-area">
    <div class="placeholder" id="placeholder">Select or create a conversation to begin</div>
  </div>

  <!-- Input -->
  <div id="input-wrapper">
    <div id="file-chips"></div>
    <div id="input-bar">
      <input type="file" id="file-input" multiple hidden
        accept=".pdf,.docx,.txt,.md,.csv,.log,.json,.xml,.yaml,.yml,.py,.js,.ts,.html,.css"
        onchange="onFilesSelected(this)">
      <button id="attach-btn" onclick="document.getElementById('file-input').click()" title="Attach files">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <textarea id="msg-input" rows="1"
        placeholder="Message… (Enter to send, Shift+Enter for newline)"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="send()">Send</button>
      <button id="batch-btn" onclick="sendBatch()" title="Send via Batch API (50% cheaper, async)">Batch</button>
      <button id="stop-btn" onclick="stopGeneration()" style="display:none">Stop</button>
    </div>
  </div>

</div>

<!-- Knowledge Base Modal -->
<div id="kb-overlay" onclick="closeKbModal()">
  <div id="kb-modal" onclick="event.stopPropagation()">
    <div id="kb-header">
      <span id="kb-title">Knowledge Base</span>
      <button id="kb-close" onclick="closeKbModal()">&#x2715;</button>
    </div>
    <div id="kb-upload-area">
      <input type="file" id="kb-file-input" multiple hidden
        accept=".pdf,.docx,.txt,.md,.csv,.log,.json,.xml,.yaml,.yml,.py,.js,.ts,.html,.css"
        onchange="uploadKbFiles(this)">
      <button id="kb-upload-btn" onclick="document.getElementById('kb-file-input').click()">Upload Documents</button>
      <div id="kb-progress" class="kb-progress-hidden">
        <div id="kb-progress-text"></div>
        <div id="kb-progress-bar-outer"><div id="kb-progress-bar-inner"></div></div>
        <div id="kb-progress-errors"></div>
      </div>
    </div>
    <div id="kb-docs"></div>
    <div id="kb-chain-section">
      <div id="kb-chain-title">Inherited Knowledge</div>
      <div id="kb-chain"></div>
    </div>
  </div>
</div>

<!-- System Prompt Template Modal -->
<div id="spt-overlay" onclick="closeSpTemplateModal()">
  <div id="spt-modal" onclick="event.stopPropagation()">
    <div id="spt-header">
      <span id="spt-title">Prompt Templates</span>
      <button id="spt-close" onclick="closeSpTemplateModal()">&#x2715;</button>
    </div>
    <div id="spt-list"></div>
    <div id="spt-editor" style="display:none">
      <input id="spt-name" type="text" placeholder="Template name">
      <textarea id="spt-content" placeholder="Enter the system prompt..."></textarea>
      <div id="spt-editor-actions">
        <button id="spt-discard" onclick="cancelSpTemplateEdit()">Cancel</button>
        <button id="spt-save" onclick="saveSpTemplate()">Save</button>
      </div>
    </div>
    <button id="spt-new-btn" onclick="startNewSpTemplate()">+ New Template</button>
  </div>
</div>

<!-- New Conversation Popup -->
<div id="new-conv-overlay" onclick="closeNewConvPopup()">
  <div id="new-conv-popup" onclick="event.stopPropagation()">
    <h3>New Conversation</h3>
    <select id="new-conv-folder"></select>
    <div id="new-conv-popup-actions">
      <button id="new-conv-cancel" onclick="closeNewConvPopup()">Cancel</button>
      <button id="new-conv-create" onclick="newConv()">Create</button>
    </div>
  </div>
</div>

<!-- Audio Export Modal -->
<div id="audio-overlay" onclick="closeAudioModal()">
  <div id="audio-modal" onclick="event.stopPropagation()">
    <div id="audio-header">
      <span id="audio-title">Export Audio</span>
      <button id="audio-close" onclick="closeAudioModal()">&#x2715;</button>
    </div>
    <div id="audio-body">
      <div id="audio-mode-tabs">
        <button class="audio-tab active" data-mode="conversation" onclick="setAudioMode('conversation')">Conversation</button>
        <button class="audio-tab" data-mode="podcast" onclick="setAudioMode('podcast')">Podcast</button>
      </div>
      <div id="audio-conv-fields">
        <div class="audio-voice-row">
          <label>User voice</label>
          <div class="audio-voice-pick">
            <select id="audio-user-voice"></select>
            <button class="audio-preview-btn" onclick="previewVoice('audio-user-voice')">&#9654;</button>
          </div>
        </div>
        <div class="audio-voice-row">
          <label>Assistant voice</label>
          <div class="audio-voice-pick">
            <select id="audio-assistant-voice"></select>
            <button class="audio-preview-btn" onclick="previewVoice('audio-assistant-voice')">&#9654;</button>
          </div>
        </div>
      </div>
      <div id="audio-podcast-fields" style="display:none">
        <div class="audio-voice-row">
          <label>Speaker One</label>
          <div class="audio-voice-pick">
            <select id="audio-speaker-one"></select>
            <button class="audio-preview-btn" onclick="previewVoice('audio-speaker-one')">&#9654;</button>
          </div>
        </div>
        <div class="audio-voice-row">
          <label>Speaker Two</label>
          <div class="audio-voice-pick">
            <select id="audio-speaker-two"></select>
            <button class="audio-preview-btn" onclick="previewVoice('audio-speaker-two')">&#9654;</button>
          </div>
        </div>
        <p class="audio-hint">Parses SPEAKER_ONE: / SPEAKER_TWO: lines from assistant messages.</p>
      </div>
      <audio id="audio-player" style="display:none"></audio>
      <div id="audio-actions">
        <button id="audio-cancel-btn" onclick="closeAudioModal()">Cancel</button>
        <button id="audio-generate-btn" onclick="generateAudio()">Generate</button>
      </div>
    </div>
  </div>
</div>

<script src="index.js"></script>
</body>
</html>
